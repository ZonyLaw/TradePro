{% extends 'main.html' %} {% block content %}

<main class="projects">
  <h1>{{ticker.symbol}}</h1>
  <p>{{ticker.info}}</p>

  {% for price in prices %}

    <p> date {{price.date}} - close {{price.close}} </p>
    <a href = "{% url 'update-price' price.id %}" >Update Price </a>

  {% endfor %}

</main>

{% endblock content %}
