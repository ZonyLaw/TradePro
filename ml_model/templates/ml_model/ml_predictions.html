{% extends 'main.html' %} 
{% block content %}

<main>
  <h1>Model predictions</h1>

  <table>
    <tr>
      <th>Profit/Loss</th>
      <th>Probability</th>
    </tr>

    {% for category, proba in predictions.items %}
      <tr>
        <td>{{ category }}</td>
        <td>{{ proba }}%</td>
      </tr>
    {% endfor %}
  </table> 
</main>

{% endblock content %}
